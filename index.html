<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LeanBuild</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#111827">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <header>
        <h1>LeanBuild</h1>
        <p>Dein persönlicher Lean-Bulk-Ernährungsplan</p>
    </header>


    <main>

        <div class="day-navigation">
            <button id="previousDay">←</button>

            <h2 id="dayTitle">
                Montag
            </h2>

            <button id="nextDay">→</button>
        </div>


        <section id="meals">

            <div class="meal-card">

                <h3>Frühstück</h3>

                <p>
                    Wird geladen...
                </p>

            </div>


            <div class="meal-card">

                <h3>Mittagessen</h3>

                <p>
                    Wird geladen...
                </p>

            </div>


            <div class="meal-card">

                <h3>Abendessen</h3>

                <p>
                    Wird geladen...
                </p>

            </div>


        </section>


    </main>


</div>


<script src="app.js"></script>


</body>
</html>
